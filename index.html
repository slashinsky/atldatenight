<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlanta Date Night Spinner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --text: #1a1a1a;
    --text2: #5a5a58;
    --text3: #8a8a87;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 12px;
    --radius-sm: 8px;
    --accent: #7F77DD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe8;
      --text2: #a8a8a2;
      --text3: #707068;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .app {
    width: 100%;
    max-width: 540px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .header p {
    font-size: 14px;
    color: var(--text2);
  }

  .heart { color: #e05; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }

  .tab {
    padding: 9px 18px;
    border: 1px solid var(--border2);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--bg);
    color: var(--text2);
    transition: all 0.18s;
    outline: none;
  }

  .tab:hover { background: var(--bg3); color: var(--text); }

  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Wheel */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .wheel-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.15));
  }

  .wheel-wrap canvas { border-radius: 50%; display: block; }

  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid var(--text);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
    z-index: 2;
  }

  .spin-btn {
    padding: 13px 40px;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    box-shadow: 0 2px 12px rgba(127,119,221,0.35);
  }

  .spin-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(127,119,221,0.4); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Result card */
  .result-card {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.3s;
  }

  .result-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .result-detail {
    font-size: 14px;
    color: var(--text2);
  }

  .result-placeholder {
    font-size: 14px;
    color: var(--text3);
  }

  /* Manage section */
  .manage-section {
    margin-top: 1.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .manage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .manage-header:hover { background: var(--bg2); }
  .manage-header.open { border-bottom-color: var(--border); }

  .manage-header-left {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .manage-header-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }

  .manage-chevron {
    font-size: 12px;
    color: var(--text3);
    transition: transform 0.2s;
  }

  .manage-chevron.open { transform: rotate(180deg); }

  .manage-body { display: none; padding: 12px 16px 16px; }
  .manage-body.open { display: block; }

  .item-list {
    list-style: none;
    max-height: 240px;
    overflow-y: auto;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  .item-list li {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .item-list li:last-child { border-bottom: none; }
  .item-list li:nth-child(even) { background: var(--bg2); }

  .item-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .item-name-text { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-detail-text { color: var(--text3); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: color 0.15s;
  }

  .del-btn:hover { color: #e05; }

  .add-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .add-row input {
    flex: 1;
    min-width: 130px;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }

  .add-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .add-row input::placeholder { color: var(--text3); }

  .add-btn {
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    background: var(--bg);
    color: var(--text);
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.15s;
  }

  .add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .count-badge {
    display: inline-block;
    font-size: 11px;
    background: var(--bg3);
    color: var(--text3);
    border-radius: 999px;
    padding: 1px 7px;
    margin-left: 6px;
    font-weight: 500;
  }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text3);
  }
</style>
</head>

<div class="app">

  </div>

    <button class="tab active" onclick="setCategory('experiences')">✨ Experiences</button>

    <button class="spin-btn" id="spinBtn" onclick="spin()">Spin it! 🎡</button>
    <div class="result-card" id="resultCard">
      <span class="result-placeholder">Hit spin to reveal your date night pick ✨</span>
    </div>
  </div>

  <div class="manage-section">
    <div class="manage-header" id="manageHeader" onclick="toggleManage()">
      <div>
        <div class="manage-header-left">Edit this list <span class="count-badge" id="countBadge">0</span></div>

      </div>

    </div>
    <div class="manage-body" id="manageBody">
      <ul class="item-list" id="itemList"></ul>
      <div class="add-row">

        <button class="add-btn" onclick="addItem()">+ Add</button>

    </div>
  </div>

  <div class="footer">Made with ♥ for Atlanta date nights</div>
</div>

const PALETTES = {

// Load saved data from localStorage if available
function loadData() {
  try {
    const saved = localStorage.getItem('atl_date_spinner_v1');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.experiences) DATA.experiences = parsed.experiences;
      if (parsed.chill) DATA.chill = parsed.chill;
      if (parsed.fancy) DATA.fancy = parsed.fancy;
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem('atl_date_spinner_v1', JSON.stringify(DATA));
  } catch(e) {}
}

loadData();

let currentCategory = 'experiences';
let spinning = false;
let currentAngle = 0;

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['experiences','chill','fancy'][i] === cat);
  });
  currentAngle = 0;
  drawWheel(0);
  document.getElementById('resultCard').innerHTML = '<span class="result-placeholder">Hit spin to reveal your date night pick ✨</span>';
  if (document.getElementById('manageBody').classList.contains('open')) renderList();
  updateCount();
}

function getPalette(cat, n) {
  const base = PALETTES[cat] || PALETTES.experiences;
  return Array.from({length: n}, (_, i) => base[i % base.length]);
}

function drawWheel(rotation) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const items = DATA[currentCategory];
  const colors = getPalette(currentCategory, items.length);
  const cx = 150, cy = 150, r = 148;
  const slice = (2 * Math.PI) / items.length;

  ctx.clearRect(0, 0, 300, 300);

  items.forEach((item, i) => {
    const start = rotation + i * slice;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    const n = items.length;
    const fontSize = n > 35 ? 6 : n > 28 ? 7 : n > 20 ? 8 : n > 14 ? 9 : 11;
    ctx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    const maxChars = n > 35 ? 13 : n > 25 ? 15 : 18;
    const label = item.name.length > maxChars ? item.name.slice(0, maxChars - 1) + '…' : item.name;
    ctx.fillText(label, r - 10, fontSize * 0.4);
    ctx.restore();
  });

  // Center hub
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Heart in center
  ctx.font = '14px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e05';
  ctx.fillText('♥', cx, cy);
}

function spin() {
  if (spinning || DATA[currentCategory].length === 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultCard').innerHTML = '<span class="result-placeholder">Spinning...</span>';

  const extraSpins = (6 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
  const targetOffset = Math.random() * 2 * Math.PI;
  const totalRotation = extraSpins + targetOffset;
  const duration = 3800;
  const start = performance.now();
  const startAngle = currentAngle;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const angle = startAngle + totalRotation * ease(progress);
    drawWheel(angle);
    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      currentAngle = angle % (2 * Math.PI);
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showResult(angle);
    }
  }

  requestAnimationFrame(frame);
}

function showResult(finalAngle) {
  const items = DATA[currentCategory];
  const slice = (2 * Math.PI) / items.length;
  const normalized = ((-(finalAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI) + 3 * Math.PI / 2) % (2 * Math.PI);
  const idx = Math.floor(normalized / slice) % items.length;
  const pick = items[idx];
  document.getElementById('resultCard').innerHTML =
    `<span class="result-name">${pick.name}</span><span class="result-detail">${pick.detail}</span>`;
}

function toggleManage() {
  const body = document.getElementById('manageBody');
  const header = document.getElementById('manageHeader');
  const chevron = document.getElementById('manageChevron');
  const isOpen = body.classList.toggle('open');
  header.classList.toggle('open', isOpen);
  chevron.classList.toggle('open', isOpen);
  if (isOpen) renderList();
}

function updateCount() {
  document.getElementById('countBadge').textContent = DATA[currentCategory].length;
}

function renderList() {
  const ul = document.getElementById('itemList');
  ul.innerHTML = '';
  DATA[currentCategory].forEach((item, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="item-info">
        <span class="item-name-text">${item.name}</span>
        <span class="item-detail-text">${item.detail}</span>
      </div>
      <button class="del-btn" onclick="removeItem(${i})" title="Remove">×</button>`;
    ul.appendChild(li);
  });
  updateCount();
}

function removeItem(i) {
  DATA[currentCategory].splice(i, 1);
  saveData();
  drawWheel(currentAngle);
  renderList();
}

function addItem() {
  const nameEl = document.getElementById('addName');
  const detailEl = document.getElementById('addDetail');
  const name = nameEl.value.trim();
  const detail = detailEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  DATA[currentCategory].push({ name, detail: detail || '' });
  nameEl.value = '';
  detailEl.value = '';
  nameEl.focus();
  saveData();
  drawWheel(currentAngle);
  renderList();
}

// Init
drawWheel(0);
updateCount();
</script>
</body>
</html>
